name: Build VSIX Package

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Package VSIX
        run: npx @vscode/vsce package --out opencode-vscode-client.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-vscode-client-vsix
          path: opencode-vscode-client.vsix
          retention-days: 30

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: opencode-vscode-client.vsix
          generate_release_notes: true
